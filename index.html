<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>Style X | Premium Bespoke Luxury Fashion Store</title>
    <meta name="description" content="Explore Style X, the pinnacle of curated luxury collectives. Painstakingly handcrafted garments featuring custom borders, precise drapes, and 100% secure Cash on Delivery nationwide." />
    <meta name="keywords" content="Style X, Luxury Fashion Bangladesh, Bespoke Clothing, Cash on Delivery, Premium Hoodies, Royal Purple, Luxury Gold Apparel" />
    <link rel="canonical" href="https://stylex-luxury.vercel.app/" />

    <!-- Open Graph / Facebook Elements -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stylex-luxury.vercel.app/" />
    <meta property="og:title" content="Style X | Premium Bespoke Luxury Fashion Store" />
    <meta property="og:description" content="Explore Style X, the pinnacle of curated luxury collectives. Painstakingly handcrafted garments with 100% secure Cash on Delivery nationwide." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1617137968427-85924c800a22?auto=format&fit=crop&q=80&w=1200" />

    <!-- Twitter Card Elements -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://stylex-luxury.vercel.app/" />
    <meta property="twitter:title" content="Style X | Premium Bespoke Luxury Fashion Store" />
    <meta property="twitter:description" content="Explore Style X, the pinnacle of curated luxury collectives. Painstakingly handcrafted garments with 100% secure Cash on Delivery nationwide." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1617137968427-85924c800a22?auto=format&fit=crop&q=80&w=1200" />

    <!-- Inject Google Fonts (Inter + Space Grotesk) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured JSON-LD Data for Luxury Storefront -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Style X",
        "image": "https://images.unsplash.com/photo-1617137968427-85924c800a22?auto=format&fit=crop&q=80&w=800",
        "@id": "https://stylex-luxury.vercel.app/",
        "url": "https://stylex-luxury.vercel.app/",
        "telephone": "+8801700000000",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Gulshan Runway Circle",
          "addressLocality": "Dhaka",
          "postalCode": "1212",
          "addressCountry": "BD"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "23.7925",
          "longitude": "90.4078"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "00:00",
          "closes": "23:59"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
